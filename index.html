<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Friend Guessr — GuessR</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main id="app" class="center">
    <header class="header">
      <h1>Friend Guessr 👀</h1>
      <p class="subtitle">Can you guess who said this?</p>
    </header>

    <section id="frame" class="frame">
      <!-- Dynamic content injected by app.js -->
    </section>

    <nav class="controls">
      <button id="playBtn" class="btn primary">Play</button>
      <button id="howBtn" class="btn">How it works</button>
      <div id="foot" class="footnote"></div>
    </nav>
  </main>

  <!-- Minimal loaders / templates -->
  <template id="start-template">
    <div class="start-card">
      <h2>Friend Guessr</h2>
      <p>Try to beat your friends — 5 quick questions from people you follow.</p>
      <div class="meta">Fast rounds — share your scorecard on Warpcast</div>
    </div>
  </template>

  <template id="question-template">
    <div class="question-card">
      <div class="cast-preview" id="castPreview"></div>
      <div class="options" id="options"></div>
      <div class="timer" id="timer"></div>
    </div>
  </template>

  <template id="flash-template">
    <div class="flash correct"></div>
  </template>

  <template id="score-template">
    <div class="score-card">
      <h2 id="scoreText"></h2>
      <p id="rankText"></p>
      <div class="score-actions">
        <button id="shareBtn" class="btn primary">Share Score</button>
        <button id="challengeBtn" class="btn">Challenge Friends</button>
        <button id="againBtn" class="btn">Play Again</button>
      </div>
    </div>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
