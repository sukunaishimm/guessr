<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friend Guessr 👀</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <!-- Navigation / Tabs -->
    <div class="tabs">
      <button class="tab-btn" data-tab="home">Home</button>
      <button class="tab-btn" data-tab="me">Me</button>
      <button class="tab-btn" data-tab="how">How to Play</button>
    </div>

    <!-- Home / Gameplay -->
    <div id="home" class="tab-content">
      <h1>Friend Guessr 👀</h1>
      <div id="game-screen">
        <p id="cast-text">Cast text will appear here</p>
        <div id="options-container"></div>
        <p id="timer">7</p>
      </div>
      <button id="start-btn">Start Game</button>
    </div>

    <!-- Me / Profile -->
    <div id="me" class="tab-content" style="display:none;">
      <h2>My Profile</h2>
      <img id="user-pic" src="" alt="Profile Picture" class="profile-pic">
      <p id="username">Username: </p>
      <p id="streak-display">Current Streak: 0</p>
      <p id="high-score">High Score: 0</p>
    </div>

    <!-- How to Play -->
    <div id="how" class="tab-content" style="display:none;">
      <h2>How to Play</h2>
      <ul>
        <li>Guess who made the cast shown.</li>
        <li>Tap one of the three options.</li>
        <li>Each correct answer increases your streak.</li>
        <li>Share your score and challenge friends!</li>
      </ul>
    </div>

  </div>

  <!-- Farcaster SDK -->
  <script type="module" src="farcaster.js"></script>
  <!-- Game logic -->
  <script type="module" src="app.js"></script>
</body>
</html>
